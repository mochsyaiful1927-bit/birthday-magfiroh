```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  overflow:hidden;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* ⭐ background layer */
.bg {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none; /* 🔥 semua background gak bisa blok klik */
}

/* bintang */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
  animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* slide */
.slide{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:absolute;
  transition:0.8s;
  opacity:0;
  transform:translateX(100%);
  z-index:2;
}
.active{
  opacity:1;
  transform:translateX(0);
}

/* card */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  text-align:center;
  max-width:350px;
}

/* gallery */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin:15px 0;
}
.gallery img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:15px;
}

/* foto */
img.single{
  width:260px;
  border-radius:20px;
  margin:15px 0;
}

/* teks */
h1{
  background:linear-gradient(90deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;
  color:transparent;
}
p{line-height:1.6;}

/* tombol (🔥 paling atas) */
.btn{
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(90deg,#7c3aed,#f472b6);
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
  position:relative;
  z-index:10;
}
</style>
</head>

<body>

<!-- background -->
<div class="bg" id="bg"></div>

<!-- SLIDE 1 -->
<div class="slide active">
  <div class="card">
    <h1>🎂 Happy Birthday</h1>
    <p>Kehadiran kamu di hidup aku itu bukan hal biasa 💖</p>
    <button class="btn" onclick="next()">Next</button>
  </div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
  <div class="card">
    <h1>Awal Kita</h1>
    <div class="gallery">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
      <img src="foto4.jpg">
    </div>
    <button class="btn" onclick="next()">Next</button>
  </div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
  <div class="card">
    <h1>Momen</h1>
    <img src="foto1.jpg" class="single">
    <button class="btn" onclick="next()">Next</button>
  </div>
</div>

<!-- SLIDE 4 -->
<div class="slide">
  <div class="card">
    <h1>Perasaan</h1>
    <img src="foto2.jpg" class="single">
    <button class="btn" onclick="next()">Next</button>
  </div>
</div>

<!-- SLIDE 5 -->
<div class="slide">
  <div class="card">
    <h1>Selamat Ulang Tahun 💖</h1>
    <img src="foto3.jpg" class="single">
    <button class="btn" onclick="restart()">Ulang</button>
  </div>
</div>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

function next(){
  slides[current].classList.remove("active");
  current++;
  if(current >= slides.length) current = slides.length - 1;
  slides[current].classList.add("active");
}

function restart(){
  slides[current].classList.remove("active");
  current = 0;
  slides[current].classList.add("active");
}

/* ⭐ generate bintang di background layer */
const bg = document.getElementById("bg");
for(let i=0;i<80;i++){
  let s = document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  bg.appendChild(s);
}
</script>

</body>
</html>
